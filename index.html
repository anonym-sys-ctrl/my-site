<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>8 Mart Təbriki</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#ff5fa2,#ffc3a0,#ff6fd8,#ffb6e6,#ffa0c0,#ff9a9e);
background-size:600% 600%;
animation:bgmove 20s infinite alternate;
overflow-x:hidden;
overflow-y:auto;
scroll-behavior:auto;
}

@keyframes bgmove{
0%{background-position:0% 50%}
100%{background-position:100% 50%}
}

.hero{
text-align:center;
color:white;
padding:120px 20px;
font-size:40px;
font-weight:bold;
text-shadow:0 0 15px rgba(0,0,0,0.4);
}

.card{
background:white;
margin:auto;
margin-top:100px;
max-width:540px;
padding:50px;
border-radius:25px;
box-shadow:0 25px 70px rgba(0,0,0,0.4);
transform:scale(0);
animation:open 1s forwards;
position:relative;
z-index:10; /* məktublardan üst */
}

@keyframes open{
0%{transform:scale(0)}
80%{transform:scale(1.1)}
100%{transform:scale(1)}
}

input,select{
padding:14px;
width:250px;
border-radius:12px;
border:1px solid #ccc;
margin-top:10px;
font-size:16px;
}

button{
padding:14px 30px;
margin-top:20px;
border:none;
background:#ff2f7a;
color:white;
border-radius:12px;
cursor:pointer;
font-size:17px;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
background:#ff0066;
}

#message{
margin-top:30px;
font-size:18px;
line-height:1.8;
min-height:200px;
position:relative;
z-index:10; /* məktublardan üst */
}

/* ürəklər */
.heart{
position:absolute;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-900px);opacity:0}
}

/* güllər */
.flower{
position:absolute;
animation:fall 8s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100px) rotate(0)}
100%{transform:translateY(110vh) rotate(360deg)}
}

.section{
height:400px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
color:white;
text-shadow:0 0 10px black;
}
</style>
</head>

<body>

<div class="hero">
🌸 8 Martın Mübarək 🌸
</div>

<div class="card">
<p>Adını yaz:</p>
<input type="text" id="name" placeholder="Adını yaz">
<br>
<select id="type">
<option value="friend">Just Friend</option>
<option value="classmate">Sinif yoldaşı</option>
</select>
<br>
<button onclick="generate()">Təbriki göstər</button>
<div id="message"></div>
</div>

<div class="section">🌷 🌸 🌹 💐</div>

<audio id="song1" src="snowman.mp3" loop></audio>
<audio id="song2" src="oten.mp3" loop></audio>
<script>
// Məktub mesajları
const miniMessages = [
  "Sən dünyanı daha gözəl edən insansan 💖",
  "Hər günün ilham və sevgi ilə dolsun 🌸",
  "Həmişə gülərüz qalasan 😄",
  "Sən xüsusi və dəyərlisən, bunu heç unutma 🌷",
  "Hər anını sevinclə yaşa 💐",
  "Uğurlar hər zaman səninlə olsun ✨",
  "Həyatına sevgi və xoşbəxtlik qat 💌",
  "Sənin varlığın çox qiymətlidir 🌟"
];

// Animasiya növləri
const animTypes = ["slideDown","slideLeft","fadeIn","scaleUp"];

// Məktub ikonlarını yaratmaq
function createLetterIcons(){
  for(let i=0;i<10;i++){ // 10 məktub
    let letter = document.createElement("div");
    letter.innerHTML="📩";
    letter.style.position="absolute";
    letter.style.fontSize="40px";
    letter.style.cursor="pointer";
    letter.style.transition="transform 0.3s";

    // Random mövqe — saytın istənilən yeri, mətni örtməməsi üçün kartın sahəsini yoxlayırıq
    let top = Math.random() * (window.innerHeight - 200) + 50; 
    let left = Math.random() * (window.innerWidth - 50);
    letter.style.top = top + "px";
    letter.style.left = left + "px";

    // hover effekti
    letter.onmouseover = ()=>{ letter.style.transform="scale(1.3)"; };
    letter.onmouseout = ()=>{ letter.style.transform="scale(1)"; };

    // klik effekti
    letter.onclick = ()=>{ showAnimatedMessage(letter); };

    document.body.appendChild(letter);
  }
}

// Məktub mesajını animasiyalı göstər
function showAnimatedMessage(letter){
  // Əvvəlki popup varsa sil
  let existing = document.getElementById("popup-msg");
  if(existing) existing.remove();

  // Yeni mesaj
  let msg = miniMessages[Math.floor(Math.random()*miniMessages.length)];
  let popup = document.createElement("div");
  popup.id="popup-msg";
  popup.innerHTML=msg;
  popup.style.position="absolute";
  popup.style.left = (parseInt(letter.style.left) - 50) + "px";
  popup.style.top = (parseInt(letter.style.top) - 50) + "px";
  popup.style.padding="15px 20px";
  popup.style.background="rgba(255,255,255,0.95)";
  popup.style.border="2px solid #ff2f7a";
  popup.style.borderRadius="12px";
  popup.style.color="#ff0066";
  popup.style.fontWeight="bold";
  popup.style.boxShadow="0 5px 20px rgba(0,0,0,0.3)";
  popup.style.zIndex="20";
  popup.style.opacity="0";

  document.body.appendChild(popup);

  // Random animasiya
  let anim = animTypes[Math.floor(Math.random()*animTypes.length)];
  if(anim=="slideDown"){
    popup.style.transform="translateY(-50px)";
    popup.style.transition="all 0.5s ease-out";
    setTimeout(()=>{ popup.style.opacity="1"; popup.style.transform="translateY(0)"; },50);
  } else if(anim=="slideLeft"){
    popup.style.transform="translateX(50px)";
    popup.style.transition="all 0.5s ease-out";
    setTimeout(()=>{ popup.style.opacity="1"; popup.style.transform="translateX(0)"; },50);
  } else if(anim=="fadeIn"){
    popup.style.transition="opacity 0.7s ease-in";
    setTimeout(()=>{ popup.style.opacity="1"; },50);
  } else if(anim=="scaleUp"){
    popup.style.transform="scale(0.5)";
    popup.style.transition="all 0.5s ease-out";
    setTimeout(()=>{ popup.style.opacity="1"; popup.style.transform="scale(1)"; },50);
  }

  // 4 saniyə sonra yox olsun
  setTimeout(()=>popup.remove(),4000);
}

// İkonları sayt açıldığında yarat
createLetterIcons();

// Audio idarəsi
let currentAudio = null;

// Təbrik yaratmaq funksiyası
function generate(){
    let name = document.getElementById("name").value;
    let type = document.getElementById("type").value;
    if(name==""){
        alert("Adını yaz 🙂");
        return;
    }

    // Audio dəyişimi
    if(currentAudio){
        currentAudio.pause();
        currentAudio.currentTime=0;
    }
    currentAudio = (type=="friend") ? document.getElementById("song1") : document.getElementById("song2");
    currentAudio.play();

    // Uzun təbrik mətni
    let text = "";
    if(type=="friend"){
        text = `🌸 ${name}, 8 Martın mübarək!\n\n`+
        `Bu gün qadınların həyatdakı dəyəri və önəmi xatırlanır. Sənə uzun bir səmimi təbrik yazmaq istədim.\n\n`+
        `Hər günün uğur və xoşbəxtliklə dolsun. Qarşına çıxan hər fürsət sənin üçün bir sevinc və yeni bir hekayə olsun.\n\n`+
        `Sənin yolunda olan insanlar sənə sevgi və anlayış versin. Həyatın hər addımı gözəl xatirələrlə dolu olsun.\n\n`+
        `Bu gün sadəcə bayram deyil, həm də sənin dəyərinin qeyd olunduğu bir gündür. Gülümsə, ürəyini aç və günün dadını çıxar.\n\n`+
        `Hər anını dəyərləndir və bil ki, sənin xoşbəxtliyinə sevinclə baxan insanlar var.\n\n`+
        `Unutma, sən xüsusi və qiymətlisən. 8 Martın mübarək! 💖🌷\n\n`;
    } else {
        text = `🌹 ${name}, 8 Martın mübarək!\n\n`+
        `Bu gün qadınların dəyəri və həyatda rolunu qeyd edən xüsusi bir gündür. Mən də sənə uzun və səmimi bir təbrik yazmaq istədim.\n\n`+
        `Ümid edirəm ki, gələcək günlərin xoşbəxtlik, uğur və gözəl anlarla dolu olsun.\n\n`+
        `Həyat uzun bir yoldur, amma hər addımda sənə uğurlar və yaddaqalan xatirələr gətirsin.\n\n`+
        `Bu gün sadəcə bayram deyil, həm də sənin dəyərinin xatırlandığı gündür. Dincəl, gülümsə və bu günün hər anının dadını çıxar.\n\n`+
        `Sən xüsusi və qiymətlisən, buna görə bu təbrik sənə bir az sevinc və xoşbəxtlik gətirsin.\n\n`+
        `8 Martın mübarək! 🌸💐\n\n`;
    }

    typeWriter(text);
}

// Typing animasiyası
function typeWriter(text){
    let i=0;
    let speed=25;
    let box=document.getElementById("message");
    box.innerHTML="";

    function write(){
        if(i<text.length){
            if(text[i]=="\n"){
                box.innerHTML+="<br>";
            } else {
                box.innerHTML+=text[i];
            }
            i++;
            setTimeout(write,speed);
        }
    }
    write();
}

// Ürəklər
setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💖";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(20+Math.random()*20)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
},400);

// Güllər
setInterval(()=>{
    let f=document.createElement("div");
    f.className="flower";
    let arr=["🌸","🌹","🌷","💐"];
    f.innerHTML=arr[Math.floor(Math.random()*arr.length)];
    f.style.left=Math.random()*100+"vw";
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),8000);
},600);
</script>
</body>
